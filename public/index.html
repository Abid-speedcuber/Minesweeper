<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seeded Minesweeper</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="app">
  <header class="header">
    <h1 id="title">Seeded Minesweeper</h1>
  </header>

  <section id="setup" class="setup">
    <div class="card">
      <div class="field-group">
        <div class="field seed-field">
          <label for="seed">Seed</label>
          <div class="seed-wrap">
            <input id="seed" class="seed" spellcheck="false" autocomplete="off" />
            <button id="copyBtn" class="btn-icon" type="button" title="Copy seed">📋</button>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="width">Width</label>
            <input id="width" type="number" min="5" max="60" />
          </div>
          <div class="field">
            <label for="height">Height</label>
            <input id="height" type="number" min="5" max="40" />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="mines">Mines</label>
            <input id="mines" type="number" min="1" />
          </div>
          <div class="field">
            <label for="cellSize">Cell size</label>
            <input id="cellSize" type="number" min="16" max="50" />
          </div>
        </div>
        <div class="field toggle-field">
          <label>
            <span>Swap clicks</span>
            <button id="swapToggle" type="button" class="btn-secondary">Normal</button>
          </label>
        </div>
      </div>
      <div class="setup-actions">
        <button id="startBtn" class="btn-primary">Start Game</button>
        <button id="randomBtn" type="button" class="btn-secondary">🎲 Random</button>
      </div>
      <p id="message" class="note">Green cells mark the biggest empty region. Start from any green cell.</p>
    </div>
  </section>

  <section id="hud" class="hud hidden-ui">
    <span id="flags">Flags: 0/0</span>
    <span id="timer">Time: 0.0s</span>
    <button id="pauseBtn" class="btn-secondary">Pause</button>
    <button id="resetBtn" class="btn-secondary">Reset</button>
  </section>

  <div class="board-wrap">
    <div id="boardShell">
      <div id="pauseMask">PAUSED</div>
      <div id="board"></div>
    </div>
  </div>
</main>

<script type="module" src="script.js"></script>
</body>
</html>
